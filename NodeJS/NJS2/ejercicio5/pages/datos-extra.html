<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Datos extra</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
        <link rel="icon" type="image/x-icon" href="https://uxwing.com/wp-content/themes/uxwing/download/weather/weather-icon.png">
    </head>
    <body class="bg-body-secondary" style="padding-top: 70px; user-select: none;">
        <div id="menu"></div>

        <div class="container mt-4 mb-4">
            <h2 class="mb-4">Datos extra</h2>
            <div class="row g-4 justify-content-center">

                <div class="col-md-4">
                    <div class="card text-center h-100">
                        <div class="card-header">☀️ Índice UV</div>
                        <div class="card-body">
                            <h5 class="card-title display-4">{{uv}}</h5>
                            <p class="card-text text-muted">{{uv_descripcion}}</p>
                        </div>
                    </div>
                </div>

                <div class="col-md-4">
                    <div class="card text-center h-100">
                        <div class="card-header">💨 Viento</div>
                        <div class="card-body">
                            <h5 class="card-title display-4">{{viento_velocidad}}</h5>
                            <p class="card-text text-muted">Dirección: {{viento_direccion}}</p>
                        </div>
                    </div>
                </div>

                <div class="col-md-4">
                    <div class="card text-center h-100">
                        <div class="card-header">🌡️ Sensación térmica</div>
                        <div class="card-body">
                            <h5 class="card-title display-4">{{sensacion_termica}}</h5>
                            <p class="card-text text-muted">Temperatura percibida</p>
                        </div>
                    </div>
                </div>

                <div class="col-md-4">
                    <div class="card text-center h-100">
                        <div class="card-header">👁️ Visibilidad</div>
                        <div class="card-body">
                            <h5 class="card-title display-4">{{visibilidad}}</h5>
                            <p class="card-text text-muted">Distancia visible</p>
                        </div>
                    </div>
                </div>

                <div class="col-md-4">
                    <div class="card text-center h-100">
                        <div class="card-header">☁️ Nubosidad</div>
                        <div class="card-body">
                            <h5 class="card-title display-4">{{nubosidad}}</h5>
                            <p class="card-text text-muted">Cobertura del cielo</p>
                        </div>
                    </div>
                </div>

            </div>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
    </body>
</html>
