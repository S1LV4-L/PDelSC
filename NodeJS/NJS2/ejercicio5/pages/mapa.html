<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Mapa</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
        <link rel="icon" type="image/x-icon" href="https://uxwing.com/wp-content/themes/uxwing/download/weather/weather-icon.png">
    </head>
    <body class="bg-body-secondary" style="padding-top: 70px; user-select: none;">
        <div id="menu"></div>

        <div class="container px-4">
            <h2 class="mb-4">Mapa climático</h2>
            <iframe 
                src="https://embed.windy.com/embed.html?type=map&location=coordinates&metricRain=default&metricTemp=default&metricWind=default&zoom=6&overlay=temp&product=ecmwf&level=surface&lat=-36.633&lon=-57.678&message=true"
                style="width: 100%; height: calc(100vh - 150px); border: none; border-radius: 0.375rem;">
            </iframe>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
    </body>
</html>
