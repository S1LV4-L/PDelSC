<!doctype html>
<html lang="es">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Ejercicio 1</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
        <link rel="stylesheet" href="../styles/estilos.css" />
    </head>
    <body class="py-4 px-2">
        <div class="container">
            <h5 class="mb-3 text-uppercase fw-semibold">Panel de control</h5>

            <div class="btn-panel mb-4"> <!-- mb: margin bottom -->
                <div class="row g-2 justify-content-evenly"> <!-- row: activa el sistema de grilla de Bootstrap (flexbox). g-2: gap = 2 -->
                    <!-- col-6: ocupa 6/12 columnas (mitad del ancho) en pantallas pequeñas, 2 botones por fila -->
                    <!-- col-md-auto: en pantallas medianas el ancho se ajusta al contenido, todos en una fila -->
                    <div class="col-6 col-md-auto">
                        <!-- btn-sm: tamaño pequeño (padding y fuente reducidos) -->
                        <button id="btn1" class="btn btn-outline-dark btn-sm w-100 h-100">Agregar texto H1</button>
                    </div>

                    <div class="col-6 col-md-auto">
                        <button id="btn2" class="btn btn-outline-dark btn-sm w-100 h-100">Cambiar texto H1</button>
                    </div>

                    <div class="col-6 col-md-auto">
                        <button id="btn3" class="btn btn-outline-dark btn-sm w-100 h-100">Cambiar color H1</button>
                    </div>

                    <div class="col-6 col-md-auto">
                        <button id="btn4" class="btn btn-outline-dark btn-sm w-100 h-100">Agregar imagen</button>
                    </div>

                    <div class="col-6 col-md-auto">
                        <button id="btn5" class="btn btn-outline-dark btn-sm w-100 h-100">Cambiar imagen</button>
                    </div>

                    <div class="col-6 col-md-auto">
                        <button id="btn6" class="btn btn-outline-dark btn-sm w-100 h-100">Cambiar tamaño</button>
                    </div>

                    <div class="col-6 col-md-auto">
                        <button id="btn7" class="btn btn-danger btn-sm w-100 h-100">Reiniciar</button>
                    </div>
                </div>
            </div>

            <div class="row">
                <div class="col-12">
                    <p id="texto" class="mb-3"></p>
                    <img id="imagen" class="img-fluid w-50" />
                </div>
            </div>
        </div>

        <script src="../scripts/script.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
    </body>
</html>
