<!doctype html>
<html lang="es">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Ejercicio 3</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
        <link rel="stylesheet" href="../styles/estilos.css" />
    </head>
    <body class="py-4 px-2" style="background-color: lightsteelblue;">
        <div class="container">
            <h3 class="mb-3 text-uppercase fw-semibold">Panel de control</h3>

            <div id="panel" class="btn-panel mb-4">
                <div class="row g-2 justify-content-evenly">
                    <div class="col-6 col-md-auto">
                        <button id="btn1" class="btn btn-outline-dark btn-sm w-100 h-100">Mouse Over</button>
                    </div>
                    <div class="col-6 col-md-auto">
                        <button id="btn2" class="btn btn-outline-dark btn-sm w-100 h-100">Double Click</button>
                    </div>
                    <div class="col-6 col-md-auto">
                        <button id="btn3" class="btn btn-outline-dark btn-sm w-100 h-100">Mouse Out</button>
                    </div>
                    <div class="col-6 col-md-auto">
                        <button id="btn4" class="btn btn-outline-dark btn-sm w-100 h-100">Mouse Enter</button>
                    </div>
                    <div class="col-6 col-md-auto">
                        <button id="btn5" class="btn btn-outline-dark btn-sm w-100 h-100">Mouse Down</button>
                    </div>
                </div>
            </div>
            <p id="info" class="text-muted mx-2">Presione espacio para ver la cantidad de hijos del panel de control.</p>

            <div class="row">
                <div class="col-12">
                    <img id="imagen" class="img-fluid w-25">
                    <h1 id="texto"></h1>
                    <p id="resultado"></p>
                </div>
            </div>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
        <script src="../scripts/script.js" defer></script>
    </body>
</html>
